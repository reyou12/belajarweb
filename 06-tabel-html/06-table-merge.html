<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TABLE MERGE</title>
  </head>
  <body>
    <h3>contoh colspan 2</h3>
    <table border="1" cellpadding="10" cellspacing="0">
      <tr>
        <td>1,1</td>
        <td colspan="2">colspan 2</td>
      </tr>
      <tr>
        <td>2,1</td>
        <td>2,2</td>
        <td>2,3</td>
      </tr>
      <tr>
        <td>3 ,1</td>
        <td>3 ,2</td>
        <td>3 ,3</td>
      </tr>
    </table>
    <br />
    <h3>contoh rowspan 2</h3>
    <table border="1" cellpadding="10" cellspacing="0">
      <tr>
        <td>1,1</td>
        <td>1,2</td>
        <td>1,3</td>
      </tr>
      <tr>
        <td rowspan="2">Rowspan 2</td>
        <td>2,1</td>
        <td>2,3</td>
      </tr>
      <tr>
        <td>3,2</td>
        <td>3,3</td>
      </tr>
    </table>
    <br />
    <h3>contoh gabungan colspan dan rowspan</h3>
    <table border="1" cellpadding="10" cellspacing="0">
      <tr>
        <td>1,1</td>
        <td>1,2</td>
        <td>1,3</td>
        <td>1,4</td>
        <td>1,5</td>
      </tr>
      <tr>
        <td>2,1</td>
        <td colspan="2" rowspan="2">2,2</td>
        <td>2,4</td>
        <td>2,5</td>
      </tr>
      <tr>
        <td>3,1</td>
        <td>3,4</td>
        <td>3,5</td>
      </tr>
      <tr>
        <td>4,1</td>
        <td>4,2</td>
        <td>4,3</td>
        <td>4,4</td>
        <td>4,5</td>
      </tr>
    </table>
  </body>
</html>
