<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coba list</title>
  </head>
  <body>
    <h2>Ordered List</h2>
    <ol type="i">
      <li>item 1</li>
      <li>item 2</li>
      <li>item 3</li>
      <li>item 4</li>
      <li>item 5</li>
    </ol>
    <h2>Unordered List</h2>
    <ul type="disc">
      <li>item 1</li>
      <li>item 2</li>
      <li>item 3</li>
      <li>item 4</li>
      <li>item 5</li>
    </ul>
    <h2>Definition List</h2>
    <dl>
      <dt>Term 1</dt>
      <dd>Description for Term 1</dd>
      <dt>Term 2</dt>
      <dd>Description for Term 2</dd>
    </dl>
  </body>
</html>
